<!DOCTYPE html>
<html>
<head>
    <title>Humaniser Tool | Anne PT</title>
    <meta charset="UTF-8">

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: auto;
            padding: 40px;
            background-color: #f4f4f4;
        }

        .nav {
            background: white;
            padding: 12px 16px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        .nav a {
            margin-right: 14px;
            text-decoration: none;
            color: #0077cc;
            font-weight: bold;
        }

        .nav a:hover { text-decoration: underline; }

        .card {
            background: white;
            padding: 24px;
            margin-top: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
        }

        textarea {
            width: 100%;
            height: 160px;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-top: 8px;
        }

        button {
            padding: 10px 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-right: 8px;
            margin-top: 12px;
            background-color: #0077cc;
            color: white;
            font-weight: bold;
        }

        button:hover { opacity: 0.9; }

        h1 { margin-top: 0; }
    </style>
</head>

<body>

<div class="nav">
    <a href="index.html">Home</a>
    <a href="blog.html">Blog</a>
    <a href="humanizer.html">Humaniser Tool</a>
</div>

<div class="card">
    <h1>Humaniser Tool</h1>
    <p>
        Paste AI-generated text below. This starter version removes common robotic phrases
        and simplifies wording. We can later upgrade this to a real AI integration.
    </p>

    <h3>Input Text</h3>
    <textarea id="inputText" placeholder="Paste AI text here..."></textarea>

    <button onclick="humanize()">Humanise</button>
    <button onclick="copyOutput()">Copy Output</button>

    <h3>Output Text</h3>
    <textarea id="outputText" placeholder="Your rewritten text will appear here..."></textarea>
</div>

<script>
function humanize() {
    let t = document.getElementById("inputText").value;

    t = t.replace(/In today's (rapidly )?evolving/gi, "These days");
    t = t.replace(/individuals/gi, "people");
    t = t.replace(/utilize/gi, "use");
    t = t.replace(/moreover/gi, "also");
    t = t.replace(/therefore/gi, "so");
    t = t.replace(/in order to/gi, "to");
    t = t.replace(/\s+/g, " ").trim();

    document.getElementById("outputText").value = t;
}

function copyOutput() {
    const out = document.getElementById("outputText");
    out.select();
    document.execCommand("copy");
    alert("Copied!");
}
</script>

</body>
</html>
