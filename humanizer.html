<!DOCTYPE html>
<html>
<head>
    <title>Humaniser Tool | Anne PT</title>
    <meta charset="UTF-8">

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: auto;
            padding: 40px;
            background-color: #f4f4f4;
        }

        .nav {
            background: white;
            padding: 12px 16px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        .nav a {
            margin-right: 14px;
            text-decoration: none;
            color: #0077cc;
            font-weight: bold;
        }

        .nav a:hover { text-decoration: underline; }

        .card {
            background: white;
            padding: 24px;
            margin-top: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
        }

        textarea {
            width: 100%;
            height: 160px;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-top: 8px;
        }

        button {
            padding: 10px 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-right: 8px;
            margin-top: 12px;
            background-color: #0077cc;
            color: white;
            font-weight: bold;
        }

        button:hover { opacity: 0.9; }

        h1 { margin-top: 0; }
    </style>
</head>

<body>

<div class="nav">
    <a href="index.html">Home</a>
    <a href="blog.html">Blog</a>
    <a href="humanizer.html">Humaniser Tool</a>
</div>

<div class="card">
    <h1>Humaniser Tool</h1>
    <p>
        Paste AI-generated text below. This starter version removes common robotic phrases
        and simplifies wording. We can later upgrade this to a real AI integration.
    </p>

    <h3>Input Text</h3>
    <textarea id="inputText" placeholder="Paste AI text here..."></textarea>

    <button onclick="humanize()">Humanise</button>
    <button onclick="copyOutput()">Copy Output</button>

    <h3>Output Text</h3>
    <textarea id="outputText" placeholder="Your rewritten text will appear here..."></textarea>
</div>

<script>
function humanize() {
  let t = document.getElementById("inputText").value || "";

  // 1) Remove common AI filler openers
  t = t.replace(/\bIn today'?s (rapidly )?(ever-)?evolving (digital )?(world|landscape)\b[:,]?\s*/gi, "These days, ");
  t = t.replace(/\bIt is important to note that\b[:,]?\s*/gi, "");
  t = t.replace(/\bThis article will (discuss|explore|examine|outline)\b[:,]?\s*/gi, "Here’s ");
  t = t.replace(/\bIn conclusion\b[:,]?\s*/gi, "Overall, ");

  // 2) Simplify formal words
  const swaps = [
    ["utilize", "use"],
    ["individuals", "people"],
    ["numerous", "many"],
    ["significant", "big"],
    ["commence", "start"],
    ["terminate", "end"],
    ["therefore", "so"],
    ["moreover", "also"],
    ["furthermore", "also"],
    ["however", "but"],
    ["in order to", "to"],
    ["facilitate", "help"],
    ["leverage", "use"],
    ["enhance", "improve"],
    ["demonstrate", "show"],
    ["approximately", "about"]
  ];

  swaps.forEach(([a,b]) => {
    const re = new RegExp("\\b" + a + "\\b", "gi");
    t = t.replace(re, b);
  });

  // 3) Make sentences less robotic
  // Replace overly formal connectors
  t = t.replace(/\bAs a result\b/gi, "Because of that");
  t = t.replace(/\bIn addition\b/gi, "Also");
  t = t.replace(/\bOn the other hand\b/gi, "At the same time");

  // 4) Break up very long sentences (simple heuristic)
  // If a sentence is too long, split at ", and" or ", but" when possible.
  t = t.replace(/,\s+(and|but)\s+/gi, ". $1 ");
  t = t.replace(/;\s+/g, ". ");

  // 5) Clean up spacing
  t = t.replace(/\s+/g, " ").trim();

  // 6) Optional: add a more human tone for intros
  // If it starts with "These days," keep it; otherwise add a gentle opener
  if (t.length > 0 && !/^These days,|^Overall,|^Here’s|^I\b|^We\b/gi.test(t)) {
    t = "Here’s a clearer version: " + t;
  }

  document.getElementById("outputText").value = t;
}

function copyOutput() {
  const out = document.getElementById("outputText");
  out.select();
  document.execCommand("copy");
  alert("Copied!");
}
</script>
